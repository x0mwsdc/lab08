name: CMake Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Configure CMake
      run: cmake -B build -S . -DBUILD_TESTS=ON

    - name: Build project
      run: cmake --build build

    - name: Run Tests
      run: cd build && ctest --output-on-failure
